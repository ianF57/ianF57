{% extends 'base.html' %}
{% block content %}
<h1>Admin product management</h1>
<form class="form" method="post">
  <label>Name<input type="text" name="name" required></label>
  <label>Description<textarea name="description" required></textarea></label>
  <label>Price<input type="number" step="0.01" min="0" name="price" required></label>
  <label>Stock<input type="number" min="0" name="stock" required></label>
  <label>Image URL<input type="url" name="image_url" required></label>
  <button class="btn" type="submit">Add product</button>
</form>

<section class="grid">
  {% for product in products %}
    <article class="card small">
      <h3>{{ product['name'] }}</h3>
      <p>{{ product['price_cents']|money }} | Stock: {{ product['stock'] }}</p>
    </article>
  {% endfor %}
</section>
{% endblock %}
